<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>IDO AI</title>

<style>

*{
    box-sizing:border-box;
}


body{

    margin:0;
    height:100vh;

    background:#202123;

    font-family:Arial,sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;

}



.container{

    width:90%;
    max-width:750px;

    text-align:center;

}



.logo{

    font-size:45px;

    font-weight:bold;

    letter-spacing:5px;

    margin-bottom:20px;

    color:white;

}



.mode{

    position:fixed;

    top:20px;

    left:20px;

    background:#343541;

    padding:12px 18px;

    border-radius:15px;

    cursor:pointer;

}



.box{

    background:#343541;

    padding:20px;

    border-radius:20px;

}



.answer{

    background:#202123;

    border-radius:15px;

    padding:20px;

    min-height:100px;

    text-align:right;

    font-size:20px;

    line-height:1.7;

    margin-bottom:20px;

}



form{

    display:flex;

    gap:10px;

}



textarea{

    flex:1;

    height:90px;

    resize:none;

    border:none;

    outline:none;

    border-radius:15px;

    padding:15px;

    font-size:18px;

}



button{

    width:120px;

    border:none;

    border-radius:15px;

    background:#10a37f;

    color:white;

    font-size:18px;

    cursor:pointer;

}



button:hover{

    background:#13c997;

}



.tools{

    margin-top:15px;

}



.tool-btn{

    background:#444654;

    padding:10px 18px;

    border-radius:15px;

    display:inline-block;

    margin:5px;

    cursor:pointer;

}



.tool-btn:hover{

    background:#565869;

}



#micStatus{

    margin-top:10px;

    color:#10a37f;

}



.time{

    margin-top:15px;

    color:#aaa;

}


</style>

</head>


<body>


<div class="mode">
🌙
</div>



<div class="container">


<div class="logo">
IDO AI
</div>


<div class="box">


<div class="answer">

{% if answer %}

{{ answer }}

{% else %}

مرحباً! أنا IDO AI 🤖  
كيف يمكنني مساعدتك؟

{% endif %}

</div>



<form method="POST">


<textarea
id="question"
name="question"
placeholder="اكتب رسالتك هنا..."
></textarea>


<button type="submit">
إرسال
</button>


</form>



<div class="tools">


<div class="tool-btn" id="micBtn">
🎤 تفعيل الميكروفون
</div>


</div>



<div id="micStatus">
الميكروفون مغلق
</div>



<div class="time">
الوقت: {{ time }}
</div>


</div>


</div>



<script>

const micBtn = document.getElementById("micBtn");
const micStatus = document.getElementById("micStatus");
const textarea = document.getElementById("question");


let recognition;
let active = false;


if ("webkitSpeechRecognition" in window) {

    recognition = new webkitSpeechRecognition();

    recognition.lang = "ar-SA";

    recognition.continuous = false;

    recognition.interimResults = false;


    recognition.onresult = function(event){

        let text = event.results[0][0].transcript;

        textarea.value += text;

    };


    recognition.onend = function(){

        active = false;

        micBtn.innerHTML = "🎤 تفعيل الميكروفون";

        micStatus.innerHTML = "الميكروفون مغلق";

    };

}



micBtn.onclick = function(){


    if(!recognition){

        alert("المتصفح لا يدعم الميكروفون");

        return;

    }



    if(!active){

        recognition.start();

        active = true;


        micBtn.innerHTML = "🎤 الميكروفون مفعل";

        micStatus.innerHTML = "تحدث الآن...";

    }


};

</script>


</body>

</html>
